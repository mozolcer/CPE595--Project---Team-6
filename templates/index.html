<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SortSmart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f111a; color: #e2e8f0; }
  .container { max-width: 860px; margin: 0 auto; padding: 32px 20px; }

  header { text-align: center; margin-bottom: 32px; }
  header h1 { font-size: 1.8rem; color: #fff; }
  header h1 span { color: #276ef1; }
  header p { color: #64748b; font-size: .85rem; margin-top: 4px; }

  /* Sample grid */
  h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 12px; }
  .samples { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 32px; }
  .sample {
    cursor: pointer; border-radius: 10px; overflow: hidden;
    border: 3px solid transparent; transition: border-color .15s, transform .15s;
    position: relative;
  }
  .sample:hover { transform: scale(1.04); }
  .sample.selected { border-color: #276ef1; }
  .sample img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .sample .label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.65); color: #fff; text-align: center;
    font-size: .7rem; padding: 3px 0; text-transform: capitalize;
  }

  /* Result panel */
  .result {
    background: #1a1d2e; border-radius: 12px; padding: 28px;
    display: none; animation: fadeIn .3s ease;
  }
  .result.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .result-top { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .result-top img { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; }
  .pred-class { font-size: 1.6rem; font-weight: 700; text-transform: capitalize; }
  .pred-conf { color: #8892a4; font-size: .9rem; }
  .badge {
    display: inline-block; padding: 5px 14px; border-radius: 16px;
    font-weight: 600; font-size: .8rem; margin-top: 4px;
  }
  .badge.recycle { background: #166534; color: #bbf7d0; }
  .badge.trash { background: #7f1d1d; color: #fecaca; }
  .tip { color: #94a3b8; font-size: .8rem; margin-top: 2px; }

  .bars { margin-top: 4px; }
  .bar-row { display: flex; align-items: center; margin-bottom: 6px; }
  .bar-label { width: 75px; font-size: .8rem; text-transform: capitalize; color: #94a3b8; }
  .bar-track { flex: 1; background: #252839; border-radius: 4px; height: 20px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .35s ease; display: flex; align-items: center; padding-left: 8px; font-size: .7rem; font-weight: 600; min-width: 32px; }
  .bar-fill.top { background: #276ef1; color: #fff; }
  .bar-fill.other { background: #374151; color: #94a3b8; }

  .empty { text-align: center; color: #475569; padding: 40px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Sort<span>Smart</span></h1>
    <p>Select a sample item to classify</p>
  </header>

  <h2>Choose an item</h2>
  <div class="samples" id="samples">
    {% for fname in samples %}
    <div class="sample" data-file="{{ fname }}" onclick="classify(this)">
      <img src="/static/samples/{{ fname }}" alt="{{ fname }}">
      <div class="label">{{ fname.replace('.jpg','') }}</div>
    </div>
    {% endfor %}
  </div>

  <div class="empty" id="empty">Click an image above to see the prediction</div>

  <div class="result" id="result">
    <div class="result-top">
      <img id="resImg" src="">
      <div>
        <div class="pred-class" id="predClass"></div>
        <div class="pred-conf" id="predConf"></div>
        <span class="badge" id="badge"></span>
        <div class="tip" id="tip"></div>
      </div>
    </div>
    <div class="bars" id="bars"></div>
  </div>
</div>

<script>
async function classify(el) {
  document.querySelectorAll('.sample').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');

  const file = el.dataset.file;
  document.getElementById('empty').style.display = 'none';
  document.getElementById('result').classList.remove('show');

  const res = await fetch('/predict', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({filename: file})
  });
  const d = await res.json();

  document.getElementById('resImg').src = '/static/samples/' + file;
  document.getElementById('predClass').textContent = d.prediction;
  document.getElementById('predConf').textContent = (d.confidence * 100).toFixed(1) + '% confidence';

  const badge = document.getElementById('badge');
  badge.textContent = d.action;
  badge.className = 'badge ' + (d.action === 'Recycle' ? 'recycle' : 'trash');
  document.getElementById('tip').textContent = d.tip;

  const bars = document.getElementById('bars');
  bars.innerHTML = '';
  const sorted = Object.entries(d.probabilities).sort((a, b) => b[1] - a[1]);
  for (const [cls, prob] of sorted) {
    const pct = (prob * 100).toFixed(1);
    const isTop = cls === d.prediction;
    bars.innerHTML += `<div class="bar-row">
      <div class="bar-label">${cls}</div>
      <div class="bar-track">
        <div class="bar-fill ${isTop ? 'top' : 'other'}" style="width:${Math.max(prob*100, 3)}%">${pct}%</div>
      </div>
    </div>`;
  }
  document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
